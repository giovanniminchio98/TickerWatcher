name: TickerWatch

on:
  # No in-repo `schedule:` trigger -- GitHub's own scheduler is documented to
  # be unreliable in 2026 (delayed/dropped runs, worse at exact top-of-hour).
  # An external cron service (cron-job.org) calls the workflow_dispatch API
  # below instead; see README for setup. Keep workflow_dispatch as the only
  # trigger so there's a single source of truth for run timing.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in DRY_RUN mode (log posts instead of calling the X API)"
        type: boolean
        default: false

concurrency:
  group: tickerwatch-run
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run TickerWatch
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_COST_CHAT_ID: ${{ secrets.TELEGRAM_COST_CHAT_ID }}
        run: python -m src.main

      - name: Commit updated state
        run: |
          git config user.name "tickerwatch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/state.json
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          # actions/checkout pins the branch snapshot from when this run was
          # queued, not a live pull -- if another run pushed in the meantime
          # (e.g. two dispatches landing close together), a plain `git push`
          # gets rejected. Rebase onto the latest remote state and retry a
          # few times before giving up, same fix used manually all session.
          # A rebase conflict (two runs changing the same state field) is left
          # unresolved on purpose rather than force-guessed -- that just means
          # this run's bookkeeping update doesn't persist, same as today's
          # harmless failure, never a corrupted push to main.
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "push rejected, fetching + rebasing (attempt $i)"
            git fetch origin main
            if ! git rebase origin/main; then
              echo "rebase conflict -- giving up cleanly, this run's state update won't persist"
              git rebase --abort
              exit 1
            fi
            sleep 2
          done
          echo "push still failing after retries"
          exit 1
