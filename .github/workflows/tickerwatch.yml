name: TickerWatch

on:
  schedule:
    # every hour -> 24 runs/day, ~730 runs/month. See README for why higher
    # check frequency mostly buys faster alert latency, not proportionally
    # higher cost (most post types are capped by date/cooldown, not by
    # how often we check). Offset to :07 rather than the exact top of the
    # hour -- GitHub's scheduler is most congested at :00 (every repo on the
    # platform tends to schedule there) and can delay/skip runs there.
    - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in DRY_RUN mode (log posts instead of calling the X API)"
        type: boolean
        default: false

concurrency:
  group: tickerwatch-run
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run TickerWatch
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main

      - name: Commit updated state
        run: |
          git config user.name "tickerwatch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/state.json
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git push
